<h1>How Europe works with Claude: AI adoption across 33 markets</h1>
<p>An interactive dashboard analysing how 33 European markets use AI, based on the Anthropic Economic Index. It covers three questions: how intensely each market has adopted AI, whether people use it to automate or to collaborate, and where Claude is used to write code. <strong>Enable JavaScript to use the interactive charts.</strong></p>

<h2>Adoption is deepest in the West and North</h2>
<p>Measured as usage per capita (a market's share of Claude usage divided by its share of the world's working-age population), Switzerland leads at about 5.0 times parity, followed by Luxembourg (4.9) and Norway (4.0). Most of Western and Northern Europe sits well above 1.0, while Ukraine, Hungary, and Serbia are still building from a lower base.</p>

<h2>Southern and Eastern Europe automate; the Nordics collaborate</h2>
<p>Every conversation leans toward automation (delegating a whole task) or augmentation (iterating with AI). Norway is the most collaborative, keeping AI in the loop on about 59% of conversations, alongside Denmark and Belgium. Malta, Estonia, and Croatia lean furthest toward automation.</p>

<h2>The AI coding heavy-hitters are in the East</h2>
<p>Technical use, the share of conversations producing code, scripts, or database queries, is led by Central and Eastern Europe. Serbia and Ukraine top the table at about 9.3%, with Croatia and Slovenia close behind. The UK, Ireland, and Iceland sit near the bottom around 4.3 to 4.6%. This reflects what people make with Claude, not how skilled they are.</p>

<h2>About the data</h2>
<p>Source: the <a href="https://www.anthropic.com/economic-index">Anthropic Economic Index</a>, May 2026 release, covering Claude.ai chat and Cowork usage (Free, Pro, and Max). It excludes enterprise API usage and other AI tools. Occupation and topic labels are inferred from conversation content; figures are model estimates. Released under CC-BY. Covers all 33 European markets in the dataset.</p>
